<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>
</head>
<body>

<h2 align="center">USER FORM</h2>

<form>
    <ul>
        <li>
            FIRST NAME
            <input type="text" name="firstname">
        </li>
        <br>

        <li>
            PASSWORD
            <input type="password" name="password">
        </li>
        <br>

        <li>
            GENDER
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </li>
        <br>

        <li>
            ADDRESS
            <br><br>
            <textarea rows="5" cols="25"></textarea>
        </li>
        <br>

        <li>
            D.O.B
            <select>
                <option>Jan</option>
                <option>Feb</option>
                <option>Mar</option>
                <option>Apr</option>
                <option>May</option>
                <option>Jun</option>
                <option>Jul</option>
                <option>Aug</option>
                <option>Sep</option>
                <option>Oct</option>
                <option>Nov</option>
                <option>Dec</option>
            </select>

            <select>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
            </select>

            <select>
                <option>1990</option>
                <option>1991</option>
                <option>1992</option>
                <option>1993</option>
                <option>1994</option>
            </select>
        </li>
        <br>

        <li>
            SELECT GAMES
            <input type="checkbox"> Hockey
            <input type="checkbox"> Football
            <input type="checkbox"> Cricket
            <input type="checkbox"> VolleyBall
        </li>
        <br>

        <li>
            MARITAL STATUS
            <input type="radio" name="marital"> Married
            <input type="radio" name="marital"> Unmarried
        </li>
        <br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

        <br><br>

        <input type="checkbox"> I accept this agreement
    </ul>
</form>

</body>
</html>
